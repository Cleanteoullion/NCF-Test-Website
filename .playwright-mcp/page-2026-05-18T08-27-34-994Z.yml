          - generic [ref=e94]: Une valeur défendable, pas une posture de négociation
          - paragraph [ref=e95]: Trois angles croisés, rentabilité future, comparables sectoriels, valeur du patrimoine, avec une pondération expliquée et des scénarios alternatifs testés. Vous repartez avec une fourchette de valeur et une valeur centrale qui tiennent si elles sont examinées.
        - generic [ref=e96]:
          - img [ref=e98]
          - generic [ref=e102]: Les ajustements liés à votre situation chiffrés et justifiés
          - paragraph [ref=e103]: Détenir une part minoritaire, c'est moins de pouvoir de décision et plus de difficulté à revendre. Ces deux réalités font baisser la valeur, nous le mesurons explicitement, ligne par ligne, sans pourcentage hors contexte. Chaque point est rattaché à une hypothèse lisible.
        - generic [ref=e104]:
          - img [ref=e106]
          - generic [ref=e112]: Le pacte d'associés lu et intégré à l'évaluation
          - paragraph [ref=e113]: "Clauses de prix, clauses de sortie conjointe, clauses qui distinguent une sortie volontaire d'une sortie forcée : chaque clause est lue, et son impact sur la valeur est articulé avec la valeur de votre société. Vous comprenez d'où vient chaque écart, et ce qui se négocie vraiment."
        - generic [ref=e114]:
          - img [ref=e116]
          - generic [ref=e123]: Un rapport que votre avocat pourra défendre
          - paragraph [ref=e124]: Remise du rapport PDF et réunion de restitution en présence de vos conseils si vous le souhaitez. NCF reste disponible pour répondre aux questions des conseils après la remise, quand le dossier avance ou qu'une clause est contestée.
    - generic [ref=e126]:
      - generic [ref=e127]:
        - generic [ref=e128]: Différenciation
        - heading "Un cabinet spécialisé en évaluation, pas en contentieux." [level=2] [ref=e129]
        - paragraph [ref=e130]: Vous méritez un rapport produit par des évaluateurs dont c'est le métier quotidien, construit pour éclairer une décision entre associés, pas pour alimenter un conflit.
      - generic [ref=e131]:
        - generic [ref=e132]:
          - generic [ref=e133]: "01"
          - generic [ref=e134]: L'évaluation, notre cœur de métier
          - paragraph [ref=e135]: L'évaluation est notre métier principal, pas un complément d'offre greffé sur une activité d'expert-comptable ou de gestion de patrimoine. Les dossiers de litiges et de mouvements sur le capital sont une pratique quotidienne chez NCF, pas une exception.
        - generic [ref=e136]:
          - generic [ref=e137]: "02"
          - generic [ref=e138]: Un rapport opposable en cas de contestation
          - paragraph [ref=e139]: Chaque hypothèse est documentée, chaque ajustement argumenté, chaque baisse de valeur justifiée. Si la contre-partie conteste, la réponse est déjà dans le rapport. Votre avocat dispose d'une pièce qu'il peut produire sans la reconstruire.
        - generic [ref=e140]:
          - generic [ref=e141]: "03"
          - generic [ref=e142]: La lecture du pacte et l'articulation entre valeur réelle et valeur contractuelle
          - paragraph [ref=e143]: Quand votre pacte impose un mode de calcul contractuel, NCF le lit, le chiffre, et l'articule avec la valeur économique de l'entreprise. Vous savez d'où vient chaque écart, et où la négociation se joue vraiment.
