    - heading "Nous sommes des experts de l'évaluation." [level=2] [ref=e200]
    - paragraph [ref=e201]: "Cabinet indépendant exclusivement dédié à l'évaluation d'entreprise, nous accompagnons les dirigeants de PME (1 à 10 M€ de CA) dans leurs décisions les plus engageantes : transmission familiale, désaccord entre associés, rachat d'une entreprise. Adossés au Groupe Novances, nous croisons trois métiers, comptable, juridique, patrimonial, pour produire un rapport solide. Un document que vos conseils peuvent reprendre tel quel, et qui tient face à l'administration fiscale en cas de contrôle."
