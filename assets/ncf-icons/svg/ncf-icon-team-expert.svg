<!-- NCF Icon · team/expert · v2.0 · 24×24 · moderne + équerres -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Signature NCF : équerres aux coins opposés -->
  <path d="M 1 4 L 1 1 L 4 1" stroke-width="1"/>
  <path d="M 20 23 L 23 23 L 23 20" stroke-width="1"/>

  <!-- Tête -->
  <circle cx="12" cy="9" r="3"/>
  <!-- Buste -->
  <path d="M 6 19 Q 6 14 12 14 Q 18 14 18 19"/>
  <!-- Petit insigne discret sur le buste (un point central) -->
  <circle cx="12" cy="17" r="0.8" fill="currentColor" stroke="none"/>
</svg>
