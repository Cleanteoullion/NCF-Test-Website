<!-- NCF Icon · process/calendar · v2.0 · 24×24 · moderne + équerres -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Signature NCF : équerres aux coins opposés -->
  <path d="M 1 4 L 1 1 L 4 1" stroke-width="1"/>
  <path d="M 20 23 L 23 23 L 23 20" stroke-width="1"/>

  <!-- Corps du calendrier -->
  <rect x="5" y="6" width="14" height="14"/>
  <!-- Ligne du haut (séparation en-tête) -->
  <line x1="5" y1="10" x2="19" y2="10"/>
  <!-- Anneaux de reliure -->
  <line x1="9" y1="4" x2="9" y2="7"/>
  <line x1="15" y1="4" x2="15" y2="7"/>
  <!-- Point central (jour sélectionné) -->
  <circle cx="12" cy="15" r="1.5"/>
</svg>
