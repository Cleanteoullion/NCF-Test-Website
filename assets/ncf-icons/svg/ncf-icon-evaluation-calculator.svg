  <circle cx="12" cy="12" r="0.6" fill="currentColor" stroke="none"/>
  <circle cx="15" cy="12" r="0.6" fill="currentColor" stroke="none"/>
  <circle cx="9" cy="16" r="0.6" fill="currentColor" stroke="none"/>
