<!-- NCF Icon · process/signature · v2.0 · 24×24 · moderne + équerres -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Signature NCF : équerres aux coins opposés -->
  <path d="M 1 4 L 1 1 L 4 1" stroke-width="1"/>
  <path d="M 20 23 L 23 23 L 23 20" stroke-width="1"/>

  <!-- Plume / stylo en diagonale -->
  <path d="M 17 6 L 7 16"/>
  <!-- Pointe de la plume -->
  <path d="M 7 16 L 5 18 L 7 16 Z"/>
  <line x1="5" y1="18" x2="7" y2="16"/>
  <!-- Trait de signature paraphé en dessous -->
  <path d="M 6 20 Q 9 19 12 20 Q 15 21 18 20" stroke-width="1"/>
</svg>
