<!-- NCF Icon · evaluation/holding · v2.0 · 24×24 · moderne + équerres -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Signature NCF : équerres aux coins opposés -->
  <path d="M 1 4 L 1 1 L 4 1" stroke-width="1"/>
  <path d="M 20 23 L 23 23 L 23 20" stroke-width="1"/>

  <!-- Holding (carré du haut) -->
  <rect x="10" y="5" width="4" height="4"/>
  <!-- Filiales (3 carrés du bas) -->
  <rect x="5" y="16" width="4" height="4"/>
  <rect x="10" y="16" width="4" height="4"/>
  <rect x="15" y="16" width="4" height="4"/>
  <!-- Lignes de hiérarchie -->
  <line x1="12" y1="9" x2="12" y2="12.5"/>
  <line x1="7" y1="12.5" x2="17" y2="12.5"/>
  <line x1="7" y1="12.5" x2="7" y2="16"/>
  <line x1="12" y1="12.5" x2="12" y2="16"/>
  <line x1="17" y1="12.5" x2="17" y2="16"/>
</svg>
