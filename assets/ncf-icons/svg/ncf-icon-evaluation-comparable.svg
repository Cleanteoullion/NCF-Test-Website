<!-- NCF Icon · evaluation/comparable · v2.0 · 24×24 · moderne + équerres -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Signature NCF : équerres aux coins opposés -->
  <path d="M 1 4 L 1 1 L 4 1" stroke-width="1"/>
  <path d="M 20 23 L 23 23 L 23 20" stroke-width="1"/>

  <!-- Carré gauche (entité A) -->
  <rect x="4" y="7" width="7" height="10"/>
  <!-- Carré droit (entité B) -->
  <rect x="13" y="7" width="7" height="10"/>
  <!-- Signe égal au centre, intercalé -->
  <line x1="11" y1="10.5" x2="13" y2="10.5" stroke-width="1"/>
  <line x1="11" y1="13.5" x2="13" y2="13.5" stroke-width="1"/>
</svg>
